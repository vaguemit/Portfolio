<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mit's Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts for cyberpunk typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,700;1,700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sky background gradient -->
    <div class="background-sky"></div>
    
    <!-- Top Navigation Bar (Angled) -->
    <header class="top-nav-container">
        <div class="top-nav-shape">
            <nav class="nav-links">
                <a href="#projects" class="nav-btn" style="transform: skew(-8deg) rotate(-1deg);">PROJECTS</a>
                <div class="nav-separator"></div>
                <a href="#about" class="nav-btn" style="transform: skew(-8deg) rotate(1deg);">ABOUT ME</a>
                <div class="nav-separator"></div>
                <a href="#experience" class="nav-btn" style="transform: skew(-8deg) rotate(-2deg);">EXPERIENCE</a>
            </nav>
        </div>
    </header>

    <!-- Cyberpunk Music Player (iPod style, hangs from navbar) -->
    <div class="player-mount">
        <div class="player-wire wire-left"></div>
        <div class="player-wire wire-right"></div>

        <div class="cp-player" id="cpPlayer">
            <!-- Screws -->
            <div class="cp-screw cp-screw-tl"></div>
            <div class="cp-screw cp-screw-tr"></div>

            <!-- Header -->
            <div class="cp-header">
                <span class="cp-label">// SYS_AUDIO //</span>
                <span class="cp-status-dot" id="statusDot"></span>
            </div>

            <!-- Screen: oscilloscope + track info -->
            <div class="cp-screen">
                <canvas id="vizCanvas" width="180" height="80"></canvas>
                <div class="cp-screen-overlay"></div>
                <div class="cp-screen-info">
                    <div class="cp-track-name" id="trackName">NO SIGNAL</div>
                    <div class="cp-track-artist" id="trackArtist">--- ---</div>
                </div>
            </div>

            <!-- Progress -->
            <div class="cp-progress-wrap">
                <span class="cp-time" id="currentTime">0:00</span>
                <div class="cp-progress-bar" id="progressBar">
                    <div class="cp-progress-fill" id="progressFill"></div>
                    <div class="cp-progress-head" id="progressHead"></div>
                </div>
                <span class="cp-time" id="totalTime">0:00</span>
            </div>

            <!-- iPod Click Wheel Area -->
            <div class="cp-wheel-wrap">
                <div class="cp-wheel">
                    <!-- Top: Prev -->
                    <button class="cp-wheel-btn cp-wheel-top" id="prevBtn" title="Previous">&#9664;&#9664;</button>
                    <!-- Bottom: Next -->
                    <button class="cp-wheel-btn cp-wheel-bottom" id="nextBtn" title="Next">&#9654;&#9654;</button>
                    <!-- Left: Vol Down -->
                    <button class="cp-wheel-btn cp-wheel-left" id="volDnBtn" title="Vol -">&#8722;</button>
                    <!-- Right: Vol Up -->
                    <button class="cp-wheel-btn cp-wheel-right" id="volUpBtn" title="Vol +">&#43;</button>
                    <!-- Center: Play -->
                    <button class="cp-wheel-center" id="playBtn" title="Play/Pause">
                        <span id="playIcon">&#9654;</span>
                    </button>
                </div>
            </div>

            <!-- LED strip -->
            <div class="cp-bottom-strip">
                <div class="cp-led cp-led-green"></div>
                <div class="cp-led cp-led-amber"></div>
                <div class="cp-led cp-led-red"></div>
                <span class="cp-bottom-text">FREQ-SYNC v2.0</span>
                <button class="cp-btn cp-btn-vol" id="muteBtn" title="Mute">&#128266;</button>
            </div>

            <div class="cp-screw cp-screw-bl"></div>
            <div class="cp-screw cp-screw-br"></div>
        </div>
    </div>


    <!-- Layered City Skyline -->
    <div class="city-skyline" id="parallax-container">
        <!-- Save your uploaded images as city-back.png and city-front.png in this folder! -->
        <img src="city-back.png" alt="City Background" class="city-layer city-back" id="parallax-back">
        <img src="city-front.png" alt="City Foreground" class="city-layer city-front" id="parallax-front">
    </div>

    <!-- Flying Vehicles -->
    <div class="vehicles-layer" id="vehiclesLayer"></div>

    <!-- Scripts -->
    <script>
        /* ===== PARALLAX ===== */
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const backOffsetX = -(x - 0.5) * 20;
            const backOffsetY = -(y - 0.5) * 10;
            const frontOffsetX = (x - 0.5) * 50;
            const frontOffsetY = (y - 0.5) * 25;
            const backLayer = document.getElementById('parallax-back');
            const frontLayer = document.getElementById('parallax-front');
            if (backLayer && frontLayer) {
                backLayer.style.transform = `translate(${backOffsetX}px, ${backOffsetY}px)`;
                frontLayer.style.transform = `translate(${frontOffsetX}px, ${frontOffsetY}px)`;
            }
        });

        /* ===== MUSIC PLAYER ===== */
        // ---- ADD YOUR TRACKS HERE ----
        const playlist = [
            // { title: 'Track Name', artist: 'Artist', src: 'music/track1.mp3' },
        ];

        let currentIndex = 0;
        let isPlaying = false;
        const audio = new Audio();
        audio.volume = 0.7;

        const playBtn    = document.getElementById('playBtn');
        const playIcon   = document.getElementById('playIcon');
        const prevBtn    = document.getElementById('prevBtn');
        const nextBtn    = document.getElementById('nextBtn');
        const muteBtn    = document.getElementById('muteBtn');
        const volDnBtn   = document.getElementById('volDnBtn');
        const volUpBtn   = document.getElementById('volUpBtn');
        const trackName  = document.getElementById('trackName');
        const trackArtist= document.getElementById('trackArtist');
        const progressFill = document.getElementById('progressFill');
        const progressHead = document.getElementById('progressHead');
        const progressBar  = document.getElementById('progressBar');
        const currentTimeEl= document.getElementById('currentTime');
        const totalTimeEl  = document.getElementById('totalTime');
        const statusDot    = document.getElementById('statusDot');

        function formatTime(s) {
            if (isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60).toString().padStart(2,'0');
            return `${m}:${sec}`;
        }

        function loadTrack(index) {
            if (playlist.length === 0) {
                trackName.textContent = 'NO SIGNAL';
                trackArtist.textContent = '--- ---';
                return;
            }
            const t = playlist[index];
            audio.src = t.src;
            trackName.textContent = t.title.toUpperCase();
            trackArtist.textContent = t.artist.toUpperCase();
            audio.load();
        }

        function play() {
            if (playlist.length === 0) return;
            audio.play();
            isPlaying = true;
            playIcon.innerHTML = '&#9646;&#9646;';
            statusDot.classList.add('active');
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            playIcon.innerHTML = '&#9654;';
            statusDot.classList.remove('active');
        }

        playBtn.addEventListener('click', () => isPlaying ? pause() : play());

        prevBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentIndex);
            if (isPlaying) play();
        });

        nextBtn.addEventListener('click', () => {
            if (playlist.length === 0) return;
            currentIndex = (currentIndex + 1) % playlist.length;
            loadTrack(currentIndex);
            if (isPlaying) play();
        });

        audio.addEventListener('ended', () => {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadTrack(currentIndex);
            play();
        });

        audio.addEventListener('timeupdate', () => {
            const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            progressFill.style.width = pct + '%';
            progressHead.style.left = pct + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        progressBar.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressBar.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        volDnBtn.addEventListener('click', () => {
            audio.volume = Math.max(0, audio.volume - 0.1);
            muteBtn.innerHTML = audio.volume === 0 ? '&#128263;' : '&#128266;';
        });

        volUpBtn.addEventListener('click', () => {
            audio.volume = Math.min(1, audio.volume + 0.1);
            muteBtn.innerHTML = '&#128266;';
        });

        muteBtn.addEventListener('click', () => {
            audio.muted = !audio.muted;
            muteBtn.innerHTML = audio.muted ? '&#128263;' : '&#128266;';
        });

        loadTrack(0);

        /* ===== OSCILLOSCOPE VISUALIZER ===== */
        const canvas = document.getElementById('vizCanvas');
        const ctx = canvas.getContext('2d');
        let analyser, dataArray, source, animId;
        let vizMode = 'idle'; // 'idle' or 'live'

        function setupAudioContext() {
            if (source) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            vizMode = 'live';
            drawLive();
        }

        function drawLive() {
            animId = requestAnimationFrame(drawLive);
            analyser.getByteTimeDomainData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 1.5;
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 6;
            const sliceW = canvas.width / dataArray.length;
            let x = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * canvas.height) / 2;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                x += sliceW;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        // Idle sine wave when not playing
        let idleT = 0;
        function drawIdle() {
            if (vizMode === 'live') return;
            requestAnimationFrame(drawIdle);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#00aa55';
            ctx.lineWidth = 1.5;
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 4;
            for (let x = 0; x <= canvas.width; x++) {
                const y = canvas.height / 2 + Math.sin((x * 0.05) + idleT) * 6;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
            idleT += 0.05;
        }
        drawIdle();

        playBtn.addEventListener('click', () => {
            if (playlist.length > 0) setupAudioContext();
        });

        /* ===== FLYING VEHICLES ===== */
        const vehiclesLayer = document.getElementById('vehiclesLayer');

        // SVG shapes for small flying vehicles
        const vehicleShapes = [
            // Speeder bike shape
            `<svg viewBox="0 0 40 14" xmlns="http://www.w3.org/2000/svg">
                <polygon points="0,7 6,2 34,2 40,7 34,12 6,12" fill="#1a0030" stroke="#a855f7" stroke-width="0.8"/>
                <rect x="10" y="4" width="20" height="6" fill="#2a0050" rx="1"/>
                <circle cx="32" cy="7" r="2" fill="#ff4444" opacity="0.9"/>
                <line x1="0" y1="7" x2="8" y2="7" stroke="#00ffff" stroke-width="0.5" opacity="0.7"/>
            </svg>`,
            // Heli-drone shape
            `<svg viewBox="0 0 30 18" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="6" width="14" height="8" rx="2" fill="#0a001a" stroke="#7b2fff" stroke-width="0.8"/>
                <line x1="0" y1="5" x2="30" y2="5" stroke="#555" stroke-width="1"/>
                <circle cx="15" cy="10" r="2" fill="#00ff88" opacity="0.8"/>
                <line x1="13" y1="5" x2="13" y2="0" stroke="#444" stroke-width="0.8"/>
                <line x1="17" y1="5" x2="17" y2="0" stroke="#444" stroke-width="0.8"/>
            </svg>`,
            // Fighter silhouette
            `<svg viewBox="0 0 50 12" xmlns="http://www.w3.org/2000/svg">
                <polygon points="0,6 8,1 42,3 50,6 42,9 8,11" fill="#0d001f" stroke="#ff2244" stroke-width="0.6"/>
                <circle cx="44" cy="6" r="1.5" fill="#ff4444"/>
                <line x1="0" y1="6" x2="10" y2="6" stroke="#ff6666" stroke-width="0.5" opacity="0.6"/>
            </svg>`
        ];

        function spawnVehicle() {
            const el = document.createElement('div');
            el.className = 'vehicle';

            const goRight = Math.random() > 0.5;
            const yPos = 8 + Math.random() * 35; // top 40% of screen
            const scale = 0.4 + Math.random() * 0.5; // small
            const duration = 12 + Math.random() * 18; // 12-30s
            const shape = vehicleShapes[Math.floor(Math.random() * vehicleShapes.length)];

            el.innerHTML = shape;
            el.style.cssText = `
                position: absolute;
                top: ${yPos}%;
                ${goRight ? 'left: -80px' : 'right: -80px'};
                width: ${30 + Math.random() * 20}px;
                transform: scaleX(${goRight ? 1 : -1}) scale(${scale});
                opacity: ${0.5 + Math.random() * 0.5};
                pointer-events: none;
                z-index: 6;
                filter: drop-shadow(0 0 3px #a855f7);
                animation: flyAcross ${duration}s linear forwards;
            `;
            if (!goRight) el.style.animationName = 'flyAcrossLeft';
            vehiclesLayer.appendChild(el);
            setTimeout(() => el.remove(), duration * 1000 + 500);
        }

        // Spawn vehicles at random intervals
        function scheduleVehicle() {
            spawnVehicle();
            setTimeout(scheduleVehicle, 2000 + Math.random() * 4000);
        }
        scheduleVehicle();
    </script>
</body>
</html>
